name: Package Install Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".goreleaser.yml"
      - "go.mod"
      - ".github/workflows/package-install-test.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*_linux_amd64.*
          if-no-files-found: error
          retention-days: 1

  install:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:stable-slim
            install: apt-get update -qq && apt-get install -y -qq /pkg/*_linux_amd64.deb
          - distro: fedora
            image: fedora:latest
            install: dnf install -y -q /pkg/*_linux_amd64.rpm
          - distro: alpine
            image: alpine:latest
            install: apk add --allow-untrusted /pkg/*_linux_amd64.apk
          - distro: arch
            image: archlinux:latest
            install: pacman -U --noconfirm /pkg/*_linux_amd64.pkg.tar.zst
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist

      - name: Install on ${{ matrix.distro }} and smoke-test
        run: |
          docker run --rm -v "$PWD/dist:/pkg:ro" "${{ matrix.image }}" sh -c '
            set -e
            ${{ matrix.install }}
            tdocker --version
            tdocker --version | grep -q "^tdocker "
          '
